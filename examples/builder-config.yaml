# OpenTelemetry Collector Builder (OCB) manifest.
#
# Build with:
#   go install go.opentelemetry.io/collector/cmd/builder@v0.154.0
#   builder --config examples/builder-config.yaml
#
# The resulting binary is written to ./otelcol-nvidia/ (see dist.output_path).
dist:
  name: otelcol-nvidia
  description: OpenTelemetry Collector distribution with the NVIDIA GPU receiver
  output_path: ./otelcol-nvidia
  otelcol_version: 0.154.0

receivers:
  # The NVIDIA GPU receiver from this repository. The package lives in the
  # nvidiareceiver/ subdirectory, so both gomod (module) and import (package)
  # are specified.
  - gomod: github.com/pierre-prevoteau/otel-receiver-nvidia v0.1.0
    import: github.com/pierre-prevoteau/otel-receiver-nvidia/nvidiareceiver
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.154.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.154.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.154.0
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.154.0

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.60.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.60.0

# Local development only: compile the receiver from this working tree instead of
# fetching a published tag. The path is relative to the generated collector's
# go.mod (the dist.output_path directory). Remove this block once you publish a
# tagged release (e.g. v0.1.0) and want to consume it from GitHub.
replaces:
  - github.com/pierre-prevoteau/otel-receiver-nvidia => ../
